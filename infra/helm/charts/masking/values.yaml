replicaCount: 2

image:
  repository: ghcr.io/mzigo-io/mzigo-masking
  pullPolicy: IfNotPresent
  tag: ""

serviceAccount:
  create: true

service:
  type: ClusterIP
  port: 8084
  metricsPort: 9104

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

readinessProbe:
  httpGet:
    path: /readyz
    port: 8084
  initialDelaySeconds: 5
  periodSeconds: 5

livenessProbe:
  httpGet:
    path: /healthz
    port: 8084
  initialDelaySeconds: 5
  periodSeconds: 10

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

terminationGracePeriodSeconds: 30

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s
  labels: {}

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: mzigo-masking

config:
  logLevel: info
  serverPort: 8084
  metricsPort: 9104
  tokenPrefix: "tok_"
  maskChar: "*"
  maskKeepSuffix: 4

# Secret must contain:
#   MZIGO_MASKING_TOKENIZATION_KEY   (HMAC secret, rotate requires token invalidation)
extraEnvFrom: []

extraVolumes: []
extraVolumeMounts: []
nodeSelector: {}
tolerations: []
