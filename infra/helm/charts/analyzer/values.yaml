replicaCount: 1

image:
  repository: ghcr.io/mzigo-io/mzigo-analyzer
  pullPolicy: IfNotPresent
  tag: ""

serviceAccount:
  create: true

service:
  type: ClusterIP
  port: 8083
  metricsPort: 9103

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  # Blast-radius analysis is memory-intensive for large lineage graphs.
  # networkx holds the full graph in memory during traversal.
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: true
  minAvailable: 1

readinessProbe:
  httpGet:
    path: /readyz
    port: 8083
  initialDelaySeconds: 10
  periodSeconds: 5

livenessProbe:
  httpGet:
    path: /healthz
    port: 8083
  initialDelaySeconds: 10
  periodSeconds: 10

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

terminationGracePeriodSeconds: 30

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s
  labels: {}

config:
  logLevel: info
  serverPort: 8083
  metricsPort: 9103
  maxTraversalDepth: 5
  reportCacheTtlSeconds: 60
  marquezNamespace: mzigo

# Secret must contain:
#   MZIGO_ANALYZER_MARQUEZ_URL
#   MZIGO_ANALYZER_DATABASE_URL
extraEnvFrom: []

extraVolumes: []
extraVolumeMounts: []
nodeSelector: {}
tolerations: []
