name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Go services ────────────────────────────────────────────────────────────

  gateway:
    name: Gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/gateway/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: services/gateway
          version: v1.56

      - name: Test
        run: go test ./... -race -count=1 -coverprofile=coverage.out

      - name: Build
        run: go build -o /dev/null ./cmd/gateway

  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/contracts/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: services/contracts
          version: v1.56

      - name: Test
        run: go test ./... -race -count=1

      - name: Build
        run: go build -o /dev/null ./cmd/contracts

  masking:
    name: Masking
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/masking
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/masking/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: services/masking
          version: v1.56

      - name: Test
        run: go test ./... -race -count=1

      - name: Build
        run: go build -o /dev/null ./cmd/masking

  # ── Python services ────────────────────────────────────────────────────────

  lineage:
    name: Lineage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/lineage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/lineage/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v

  analyzer:
    name: Analyzer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analyzer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/analyzer/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v

  sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v

  # ── Catalog ────────────────────────────────────────────────────────────────

  catalog:
    name: Catalog
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/catalog
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/catalog/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          CONTRACTS_SERVICE_URL: http://localhost:8081
          ANALYZER_SERVICE_URL: http://localhost:8083

  # ── Infrastructure ─────────────────────────────────────────────────────────

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

      - name: Format check
        run: terraform fmt -check -recursive

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Lint gateway chart
        run: helm lint infra/helm/charts/gateway

      - name: Lint contracts chart
        run: helm lint infra/helm/charts/contracts

      - name: Lint lineage chart
        run: helm lint infra/helm/charts/lineage

      - name: Lint analyzer chart
        run: helm lint infra/helm/charts/analyzer

      - name: Lint masking chart
        run: helm lint infra/helm/charts/masking

  # ── Docker builds ──────────────────────────────────────────────────────────

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, contracts, masking, lineage, analyzer, catalog]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: ghcr.io/sogodongo/mzigo-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Summary gate ───────────────────────────────────────────────────────────

  # Required status check for branch protection.
  # Branch protection rules reference this job by name. Adding or removing
  # individual jobs above does not require updating the branch protection rule.
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs:
      - gateway
      - contracts
      - masking
      - lineage
      - analyzer
      - sdk
      - catalog
      - terraform-validate
      - helm-lint
      - docker-build
    steps:
      - run: echo "All checks passed"
