name: Contract Gate

on:
  pull_request:
    paths:
      - 'contracts/**'

jobs:
  contract-gate:
    name: Schema Evolution Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed contracts
        id: changes
        run: |
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'contracts/**/*.yaml' | tr '\n' ',')
          echo "files=$changed" >> $GITHUB_OUTPUT

      - name: Run contract gate checks
        if: steps.changes.outputs.files != ''
        id: gate
        env:
          MZIGO_API_URL: ${{ vars.MZIGO_API_URL }}
          MZIGO_API_TOKEN: ${{ secrets.MZIGO_API_TOKEN }}
        run: |
          python3 .github/scripts/run_gate.py \
            --files "${{ steps.changes.outputs.files }}" \
            --environment "${{ github.base_ref == 'main' && 'production' || 'staging' }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --output gate_result.json

      - name: Post gate report as PR comment
        if: always() && steps.changes.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('gate_result.json')) return;

            const result = JSON.parse(fs.readFileSync('gate_result.json', 'utf8'));
            const icon = {
              SAFE: 'green_circle',
              COMPATIBLE: 'yellow_circle',
              BREAKING: 'red_circle'
            }[result.classification] || 'white_circle';

            let body = `## :${icon}: Contract Gate: ${result.classification}\n\n`;

            if (result.breaking_changes?.length > 0) {
              body += `### Breaking Changes\n\n`;
              body += `| Field | Change | Description |\n|---|---|---|\n`;
              for (const c of result.breaking_changes) {
                body += `| \`${c.field}\` | ${c.change_type} | ${c.description} |\n`;
              }
              body += '\n';
            }

            if (result.affected_consumers?.length > 0) {
              body += `### Affected Consumers (Blast Radius)\n\n`;
              body += `| Consumer | Team | Type |\n|---|---|---|\n`;
              for (const c of result.affected_consumers) {
                body += `| ${c.name} | ${c.team || 'unknown'} | ${c.consumer_type} |\n`;
              }
              body += '\n';
            }

            if (result.requires_approval) {
              body += `### Required Approvals\n\n`;
              body += `This change requires approval from: **${result.approval_from_teams.join(', ')}**\n\n`;
              body += `> The gate check will remain blocked until all affected team owners have approved.\n`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail on breaking change without approval
        if: steps.gate.outcome == 'success'
        run: |
          result=$(cat gate_result.json)
          classification=$(echo "$result" | python3 -c "import json,sys; print(json.load(sys.stdin)['classification'])")
          requires_approval=$(echo "$result" | python3 -c "import json,sys; print(json.load(sys.stdin).get('requires_approval', False))")

          if [ "$classification" = "BREAKING" ] && [ "$requires_approval" = "True" ]; then
            echo "Contract change is BREAKING and requires owner approval before merge."
            exit 1
          fi
